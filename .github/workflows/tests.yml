name: tests.yml
on:
  pull_request:
    branches: [ 'main' ]
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR=/usr/local/bin sudo -E sh
      - name: Run tests
        run: dagger call test
  performance:
    name: performance
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR=/usr/local/bin sudo -E sh
      - name: Compare performance
        run: dagger call test-performance >> pr_comment.md
      - name: Write PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pytest-performance-result
          path: pr_comment.md